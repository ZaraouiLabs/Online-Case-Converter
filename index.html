<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="Q-XbM2cd_CNRexjUQ9VFpJqhZxqwaHPSdarqKCTSTPw" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Case Converter | UtilitySuite</title>
    <meta name="description" content="Easily convert your text to Uppercase, Lowercase, Sentence Case, or Title Case. Fast and simple text editing.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #f1f5f9; 
            --primary: #4f46e5;
            --text: #1e293b;
            --border: #e2e8f0;
            --font-family: 'Outfit', sans-serif;
        }
        body { margin: 0; font-family: var(--font-family); background-color: var(--bg-color); color: var(--text); display: flex; min-height: 100vh; }

        .top-accent { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: var(--primary); z-index: 1000; }

        .sidebar { width: 260px; background: white; border-right: 1px solid var(--border); padding: 60px 20px; flex-shrink: 0; }
        .brand { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.25em; color: #64748b; margin-bottom: 30px; padding-left: 20px; }
        
        #tools-sidebar { display: flex; flex-direction: column; }
        .tool-btn { 
            display: block; padding: 16px 20px; margin: 2px 0; border-radius: 10px; 
            text-decoration: none; color: #475569; font-size: 13px; font-weight: 600; 
            transition: all 0.2s; border-bottom: 1px solid #f8fafc;
        }
        .tool-btn:hover { background: #f5f3ff; color: var(--primary); border-bottom-color: #e0e7ff; }

        /* Mobile specific styles */
        .mobile-nav { display: none; width: 100%; background: white; padding: 15px; border-bottom: 1px solid var(--border); }
        details summary { font-weight: 800; cursor: pointer; padding: 10px; color: var(--primary); }

        .main-content { flex: 1; padding: 60px 40px; display: flex; flex-direction: column; align-items: center; }
        .wrapper { max-width: 800px; width: 100%; }

        h1 { margin: 0 0 40px 0; color: #0f172a; font-size: 2.5rem; font-weight: 800; letter-spacing: -0.04em; }

        .ad-container { display: flex; justify-content: center; margin: 20px 0; overflow: hidden; }
        
        .card { background: white; padding: 32px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        
        textarea { width: 100%; min-height: 250px; border: 2px solid var(--border); border-radius: 12px; padding: 20px; font-size: 16px; font-family: var(--font-family); box-sizing: border-box; outline: none; margin-bottom: 15px; background: #fcfcfd; }
        textarea:focus { border-color: var(--primary); }

        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 10px; }
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        
        .action-btn { padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: white; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { border-color: var(--primary); color: var(--primary); }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { background: #4338ca; color: white; }

        .stats-grid { display: flex; gap: 20px; padding: 0 10px; font-size: 0.85rem; color: #64748b; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { display: none; }
            .mobile-nav { display: block; }
            .main-content { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="top-accent"></div>

    <nav class="mobile-nav">
        <details>
            <summary>See more tools</summary>
            <div id="mobile-tools-list"></div>
        </details>
    </nav>

    <aside class="sidebar">
        <div class="brand">UtilitySuite</div>
        <div id="tools-sidebar"></div>
    </aside>

    <main class="main-content">
        <div class="wrapper">
            <h1>Case Converter</h1>

            <div class="ad-container">
                <script>atOptions = { 'key' : 'ea9023c6230a4134ea2bb21d415f3647', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };</script>
                <script src="https://www.highperformanceformat.com/ea9023c6230a4134ea2bb21d415f3647/invoke.js"></script>
            </div>

            <div class="card">
                <textarea id="textInput" placeholder="Paste your text here..." oninput="updateStats()"></textarea>
                
                <div class="stats-grid">
                    <span id="charCount">Characters: 0</span>
                    <span id="wordCount">Words: 0</span>
                </div>

                <div class="btn-grid" style="margin-top:20px;">
                    <button class="action-btn btn-primary" onclick="transform('upper')">UPPERCASE</button>
                    <button class="action-btn btn-primary" onclick="transform('lower')">lowercase</button>
                    <button class="action-btn btn-primary" onclick="transform('title')">Title Case</button>
                    <button class="action-btn btn-primary" onclick="transform('sentence')">Sentence case</button>
                </div>
                
                <div class="action-grid">
                    <button class="action-btn" id="copyBtn" onclick="copyText()">Copy</button>
                    <button class="action-btn" onclick="clearText()">Clear</button>
                    <button class="action-btn" onclick="downloadText()">Download</button>
                </div>
            </div>

            <div class="ad-container">
                <script>atOptions = { 'key' : '7cf39fb102b8e5ac06d9ab8ec745e58c', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };</script>
                <script src="https://www.highperformanceformat.com/7cf39fb102b8e5ac06d9ab8ec745e58c/invoke.js"></script>
            </div>
        </div>
    </main>

    <script>
        const input = document.getElementById('textInput');
        const copyBtn = document.getElementById('copyBtn');

        function updateStats() {
            const text = input.value.trim();
            document.getElementById('wordCount').innerText = 'Words: ' + (text ? text.split(/\s+/).length : 0);
            document.getElementById('charCount').innerText = 'Characters: ' + text.length;
        }

        function transform(type) {
            let text = input.value;
            if (type === 'upper') input.value = text.toUpperCase();
            if (type === 'lower') input.value = text.toLowerCase();
            if (type === 'title') {
                input.value = text.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            }
            if (type === 'sentence') {
                input.value = text.toLowerCase().replace(/(^\s*\w|[\.\!\?]\s*\w)/g, c => c.toUpperCase());
            }
            updateStats();
        }

        function copyText() {
            input.select();
            document.execCommand('copy');
            copyBtn.innerText = "Copied!";
            setTimeout(() => copyBtn.innerText = "Copy", 1000);
        }

        function clearText() { input.value = ''; updateStats(); }

        function downloadText() {
            const blob = new Blob([input.value], {type: 'text/plain'});
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'converted-text.txt';
            a.click();
        }

        const tools = [
            { name: "QR Generator", url: "https://zaraouilabs.github.io/QR-Code-Generator/" },
            { name: "Image Compressor", url: "https://zaraouilabs.github.io/Image-Compressor/" },
            { name: "Date Calculator", url: "https://zaraouilabs.github.io/Date-Calculator/" },
            { name: "HEIC Converter", url: "https://zaraouilabs.github.io/HEIC-to-JPEG-converter/" },
            { name: "WebP Converter", url: "https://zaraouilabs.github.io/webp-to-jpg-convertor/" },
            { name: "JSON Formatter", url: "https://zaraouilabs.github.io/JSON-formatter/" },
            { name: "Word Counter", url: "https://zaraouilabs.github.io/wordcount-pro/" },
            { name: "Percentage Calc", url: "https://zaraouilabs.github.io/percentage_counter/" },
            { name: "Base64 Converter", url: "https://zaraouilabs.github.io/Base64_convertor/" },
            { name: "Password Generator", url: "https://zaraouilabs.github.io/Password_Generator/" },
            { name: "Loan Calculator", url: "https://zaraouilabs.github.io/loan-calculator/" }
        ];
        
        const toolsHTML = tools.map(t => `<a href="${t.url}" class="tool-btn">${t.name}</a>`).join('');
        document.getElementById('tools-sidebar').innerHTML = toolsHTML;
        document.getElementById('mobile-tools-list').innerHTML = toolsHTML;
    </script>
    <script src="https://pl30403648.effectivecpmnetwork.com/8d/6e/16/8d6e16cf626599011a4b1d03060dc5cf.js"></script>
</body>
</html>

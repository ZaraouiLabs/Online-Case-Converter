<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Converter | Text Utility</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --dark: #0f172a; }
        body { margin: 0; background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%); font-family: 'Inter', sans-serif; color: var(--dark); line-height: 1.6; }
        .wrapper { max-width: 700px; margin: 0 auto; padding: 60px 20px; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { margin: 0; font-size: 2.5rem; background: linear-gradient(to right, #4f46e5, #9333ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        textarea { width: 100%; min-height: 250px; border: 2px solid #e2e8f0; border-radius: 20px; padding: 24px; font-size: 16px; outline: none; box-sizing: border-box; background: white; margin-bottom: 10px; }
        
        .info-bar { display: flex; justify-content: space-between; font-size: 0.85rem; color: #64748b; margin-bottom: 20px; padding: 0 10px; }
        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 15px; }
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        button { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button.secondary { background: #64748b; }
        button:hover { opacity: 0.9; }
        
        .ad-placeholder { background: #ffffff; border: 1px dashed #cbd5e1; border-radius: 16px; padding: 20px; text-align: center; color: #94a3e8; margin: 30px 0; font-size: 0.85rem; }
        footer { margin-top: 50px; text-align: center; font-size: 0.75rem; color: #94a3e8; }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>Case Converter</h1>
            <p>Transform your text instantly.</p>
        </header>

        <div class="ad-placeholder">Partner Spotlight</div>

        <textarea id="textInput" placeholder="Paste your text here..." oninput="updateStats()"></textarea>
        <div class="info-bar">
            <span id="charCount">Characters: 0</span>
            <span id="wordCount">Words: 0</span>
        </div>

        <div class="btn-grid">
            <button onclick="transform('upper')">UPPERCASE</button>
            <button onclick="transform('lower')">lowercase</button>
            <button onclick="transform('title')">Title Case</button>
            <button onclick="transform('sentence')">Sentence case</button>
        </div>
        
        <div class="action-grid">
            <button class="secondary" id="copyBtn" onclick="copyText()">Copy</button>
            <button class="secondary" onclick="clearText()">Clear</button>
            <button class="secondary" onclick="downloadText()">Download</button>
        </div>

        <footer>
            <div class="ad-placeholder">Recommended Tools</div>
            <p>© 2026 Case Converter | <a href="#" style="color:var(--primary)">Privacy</a> | <a href="#" style="color:var(--primary)">Contact</a></p>
        </footer>
    </div>

    <script>
        const input = document.getElementById('textInput');
        const copyBtn = document.getElementById('copyBtn');

        function updateStats() {
            const text = input.value.trim();
            document.getElementById('wordCount').innerText = 'Words: ' + (text ? text.split(/\s+/).length : 0);
            document.getElementById('charCount').innerText = 'Characters: ' + text.length;
        }

        function transform(type) {
            let text = input.value;
            if (type === 'upper') input.value = text.toUpperCase();
            if (type === 'lower') input.value = text.toLowerCase();
            if (type === 'title') {
                input.value = text.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            }
            if (type === 'sentence') {
                input.value = text.toLowerCase().replace(/(^\s*\w|[\.\!\?]\s*\w)/g, c => c.toUpperCase());
            }
            updateStats();
        }

        function copyText() {
            input.select();
            document.execCommand('copy');
            copyBtn.innerText = "Copied!";
            setTimeout(() => copyBtn.innerText = "Copy", 1000);
        }

        function clearText() { input.value = ''; updateStats(); }

        function downloadText() {
            const blob = new Blob([input.value], {type: 'text/plain'});
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'converted-text.txt';
            a.click();
        }
    </script>
</body>
</html>
